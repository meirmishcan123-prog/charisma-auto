name: Daily AI Videos

# Every morning (before 07:00 Israel) generates 10 fresh AI videos and schedules
# them to Instagram + TikTok via Buffer across 07:00-22:00. Runs entirely on
# GitHub's servers, so it works with your PC off. Free end to end.
on:
  # Redundant triggers at odd minutes — GitHub silently drops many :00 top-of-hour
  # scheduled jobs (that is why nothing ran on 2026-07-09). The once-per-day dedup
  # (state/last_run.txt) means only the first that lands generates; the rest are
  # safe no-ops that cover for dropped runs. All fire before ~07:00 Israel so the
  # first slot of the day is still in the future.
  schedule:
    - cron: '7 3 * * *'    # ~06:07 IDT / 05:07 IST — main morning pass
    - cron: '37 3 * * *'   # ~06:37 IDT — backup
    - cron: '7 4 * * *'    # ~07:07 IDT — backup
    - cron: '7 5 * * *'    # ~08:07 IDT — backup
    # self-healing passes: slots are file-level idempotent, so these only create
    # whatever the morning pass missed (e.g. Gemini daily quota resets ~10:00 IL)
    - cron: '7 8 * * *'    # ~11:07 IDT — heal missing midday/evening slots
    - cron: '7 13 * * *'   # ~16:07 IDT — heal missing evening slots
  workflow_dispatch:
    inputs:
      max:
        description: 'Max videos this run (for testing)'
        default: '1'
      dry:
        description: 'Dry run: render + host but do NOT publish (1/0)'
        default: '0'

permissions:
  contents: write

concurrency:
  group: daily-videos
  cancel-in-progress: false

jobs:
  make:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ffmpeg + Arial-compatible fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg fonts-liberation fontconfig
          sudo fc-cache -f >/dev/null 2>&1 || true

      - name: Install node deps
        run: npm install --no-audit --no-fund

      - name: Generate + schedule videos
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BUFFER_ACCESS_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
          BUFFER_INSTAGRAM_CHANNEL_ID: ${{ secrets.BUFFER_INSTAGRAM_CHANNEL_ID }}
          BUFFER_TIKTOK_CHANNEL_ID: ${{ secrets.BUFFER_TIKTOK_CHANNEL_ID }}
          PIXABAY_KEY: ${{ secrets.PIXABAY_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          FORCE: ${{ github.event_name == 'workflow_dispatch' && '1' || '0' }}
          MAX_VIDEOS: ${{ github.event.inputs.max || '99' }}
          DRY_RUN: ${{ github.event.inputs.dry || '0' }}
        run: node scripts/run_daily.js
